# =============================================================================
# CipherMesh Relay Server — Application Configuration
# =============================================================================
# IMPORTANT: Never commit real secrets to version control.
# Use environment variables or a secrets manager in production.
# =============================================================================

spring.application.name=relay-server

# --- Server ---
server.port=8080

# --- DataSource (PostgreSQL) ---
# Override via environment variables in production:
#   DB_USERNAME, DB_PASSWORD
spring.datasource.url=jdbc:postgresql://localhost:5432/ciphermesh
spring.datasource.username=${DB_USERNAME:ciphermesh}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Note: PostgreSQLDialect auto-detected — no need to specify explicitly
spring.jpa.open-in-view=false

# --- JWT ---
# MUST be overridden via environment variable in production (min 256-bit key)
app.jwt.secret=${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_USE_A_256_BIT_SECRET_KEY}
app.jwt.expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

# --- WebSocket ---
app.websocket.allowed-origins=${WS_ALLOWED_ORIGINS:http://localhost:3000}

# --- Logging ---
logging.level.root=WARN
logging.level.com.ciphermesh=INFO
# Never enable DEBUG in production — may expose internal state

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
